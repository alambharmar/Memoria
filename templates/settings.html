{% extends "base.html" %}
{% block title %}Settings — Memoria{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Settings</h1>
    <p class="text-muted">Customize your experience</p>
</div>

<div class="card settings-card" style="margin-top: 8px;">
    <div class="card-header">
        <h3>Appearance</h3>
    </div>
    <div class="card-body">
        <div class="settings-row">
            <div class="settings-info">
                <span class="settings-title">Light Mode</span>
                <span class="settings-desc">Switch from the dark theme to a bright theme.</span>
            </div>
            <div class="toggle-switch">
                <input type="checkbox" id="theme-toggle" class="toggle-checkbox">
                <label for="theme-toggle" class="toggle-label"></label>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const toggle = document.getElementById('theme-toggle');
    const root = document.documentElement;

    if (root.getAttribute('data-theme') === 'light') {
        toggle.checked = true;
    }

    toggle.addEventListener('change', () => {
        if (toggle.checked) {
            root.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
        } else {
            root.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
        }
    });
});
</script>
{% endblock %}
